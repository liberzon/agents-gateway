name: Notify tests repo

# Fires a repository_dispatch event at agents-gateway-tests so its
# integration suite runs against the new main commit.
#
# Skipped on forks (forks don't have the TESTS_REPO_PAT secret and
# wouldn't target the maintainer's tests repo anyway).

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  trigger:
    name: Dispatch to agents-gateway-tests
    if: github.repository == 'liberzon/agents-gateway'
    runs-on: ubuntu-latest
    steps:
      - name: Send repository_dispatch
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.TESTS_REPO_PAT }}
          repository: liberzon/agents-gateway-tests
          event-type: agent-api-updated
          client-payload: |
            {
              "sha": "${{ github.sha }}",
              "ref": "${{ github.ref }}",
              "actor": "${{ github.actor }}",
              "message": ${{ toJSON(github.event.head_commit.message) }}
            }
