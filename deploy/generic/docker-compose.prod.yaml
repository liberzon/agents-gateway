version: "3.8"

services:
  agents-gateway:
    image: ghcr.io/agno-agi/agents-gateway:latest
    container_name: agents-gateway
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - DB_USER=${DB_USER}
      - DB_PASS=${DB_PASS}
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_DATABASE=${DB_DATABASE:-agents_gateway}
      - SECRET_TOKEN_ENC_KEY=${SECRET_TOKEN_ENC_KEY}
      - QDRANT_URL=${QDRANT_URL:-}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - agents-network
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 1G
        reservations:
          cpus: "0.5"
          memory: 512M

  postgres:
    image: postgres:15-alpine
    container_name: agents-gateway-db
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASS}
      - POSTGRES_DB=${DB_DATABASE:-agents_gateway}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_DATABASE:-agents_gateway}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - agents-network
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M

  # Optional: Qdrant for vector database
  qdrant:
    image: qdrant/qdrant:latest
    container_name: agents-gateway-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - agents-network
    profiles:
      - with-qdrant
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M

  # Optional: Nginx reverse proxy with SSL
  nginx:
    image: nginx:alpine
    container_name: agents-gateway-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - agents-gateway
    networks:
      - agents-network
    profiles:
      - with-nginx

networks:
  agents-network:
    driver: bridge

volumes:
  postgres_data:
  qdrant_data:
