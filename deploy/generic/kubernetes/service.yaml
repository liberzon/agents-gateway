apiVersion: v1
kind: Service
metadata:
  name: agents-gateway
  labels:
    app: agents-gateway
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 8080
      protocol: TCP
      name: http
  selector:
    app: agents-gateway
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: agents-gateway-ingress
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  tls:
    - hosts:
        - agents-gateway.example.com
      secretName: agents-gateway-tls
  rules:
    - host: agents-gateway.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: agents-gateway
                port:
                  number: 80
